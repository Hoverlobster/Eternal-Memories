<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monen 🐱</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Monen">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://widget.cloudinary.com/v1/cloudinary.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100vh; scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 1s ease;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body.soft { background: #fdf0ec; }
    body.soft::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 600px at 0% 0%, rgba(255,200,180,0.45) 0%, transparent 65%),
        radial-gradient(ellipse 500px 500px at 100% 100%, rgba(255,175,155,0.35) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .soft-photo {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 45vw; max-width: 500px;
      height: 100vh;
      object-fit: cover;
      object-position: center top;
      z-index: 1;
      pointer-events: none;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.7) 20%, black 50%);
      mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.7) 20%, black 50%);
    }
    body.soft .soft-photo { display: block; }

    .soft-photo-tint {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 45vw; max-width: 500px;
      height: 100vh;
      background: linear-gradient(135deg, rgba(255,210,195,0.2), transparent 70%);
      z-index: 2;
      pointer-events: none;
    }
    body.soft .soft-photo-tint { display: block; }

    body.chaos { background: #0a0500; }
    body.chaos::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 500px at 100% 0%, rgba(255,80,0,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 500px 600px at 0% 100%, rgba(200,50,0,0.22) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .chaos-photo {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 42vw; max-width: 460px;
      height: 100vh;
      object-fit: cover;
      object-position: center top;
      z-index: 1;
      pointer-events: none;
      filter: saturate(1.5) brightness(0.9) contrast(1.05);
      -webkit-mask-image: linear-gradient(to left, transparent 0%, rgba(0,0,0,0.7) 20%, black 50%);
      mask-image: linear-gradient(to left, transparent 0%, rgba(0,0,0,0.7) 20%, black 50%);
    }
    body.chaos .chaos-photo { display: block; }

    .chaos-photo-tint {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 42vw; max-width: 460px;
      height: 100vh;
      background: linear-gradient(135deg, rgba(255,80,0,0.12), transparent 70%);
      z-index: 2;
      pointer-events: none;
    }
    body.chaos .chaos-photo-tint { display: block; }

    .shony-label {
      display: none;
      position: fixed;
      top: 32px; left: 0;
      width: 42vw; max-width: 460px;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      color: rgba(255,150,60,0.85);
      letter-spacing: 0.1em;
      z-index: 3;
      pointer-events: none;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }
    body.chaos .shony-label { display: block; }

    /* PAGE WRAP */
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      padding: 24px 16px 80px;
      position: relative;
      z-index: 10;
    }

    .page-wrap.hidden { display: none; }

    /* MEMORIES PAGE */
    .memories-page {
      display: none;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
      padding: 24px 16px 80px;
      position: relative;
      z-index: 10;
    }
    .memories-page.active { display: flex; }

    .memories-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      max-width: 800px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .memories-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      text-align: center;
      flex: 1;
      transition: color 0.8s ease;
    }
    body.soft .memories-header h1 { color: #3d2520; }
    body.chaos .memories-header h1 { color: #fff3e0; }

    .back-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 8px 12px;
    }
    body.soft .back-btn { color: #b07060; }
    body.soft .back-btn:hover { color: #e8a090; }
    body.chaos .back-btn { color: #cc7733; }
    body.chaos .back-btn:hover { color: #ff9944; }

    .memories-content {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .memories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .memory-card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      aspect-ratio: 1;
    }
    .memory-card:hover { transform: scale(1.05); }
    body.soft .memory-card { box-shadow: 0 4px 16px rgba(200,100,80,0.2); }
    body.chaos .memory-card { box-shadow: 0 4px 16px rgba(255,100,0,0.3); }

    .memory-card img,
    .memory-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .memory-caption-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      color: white;
      padding: 16px 12px 12px;
      font-size: 12px;
      line-height: 1.4;
      max-height: 60%;
      overflow-y: auto;
      text-align: center;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      text-align: center;
    }
    .empty-state.hidden { display: none; }
    .empty-state p {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      transition: color 0.8s ease;
    }
    body.soft .empty-state p { color: #b07060; }
    body.chaos .empty-state p { color: #cc7733; }

    .add-memory-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s ease;
    }
    body.soft .add-memory-btn {
      background: rgba(232,160,140,0.2);
      color: #b07060;
      border: 1.5px solid rgba(232,160,140,0.4);
    }
    body.soft .add-memory-btn:hover {
      background: #e8a090;
      color: white;
      transform: translateX(-50%) scale(1.05);
    }
    body.chaos .add-memory-btn {
      background: rgba(255,110,0,0.15);
      color: #cc7733;
      border: 1.5px solid rgba(255,110,0,0.3);
    }
    body.chaos .add-memory-btn:hover {
      background: #ff7700;
      color: white;
      transform: translateX(-50%) scale(1.05);
    }

    /* MEMORY DETAIL PAGE */
    /* MEMORY DETAIL MODAL */
    #memoryDetailModal .modal-content {
      max-width: 600px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #memoryDetailModal .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10001;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #memoryDetailModal .close-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .memory-modal-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      height: 100%;
    }

    .detail-media-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
      max-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
    }

    .detail-media-container img,
    .detail-media-container video {
      width: 100%;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 12px;
    }

    .detail-caption-container {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      text-align: center;
      /* Hide scrollbar but allow scrolling */
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .detail-caption-container::-webkit-scrollbar {
      display: none;
    }

    .detail-caption {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      line-height: 1.6;
      margin: 0;
    }

    body.soft .detail-caption { color: #5a3028; }
    body.chaos .detail-caption { color: #ffaa55; }

    .memory-modal-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
      padding: 16px;
      flex-shrink: 0;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
    }

    /* PHONE-SPECIFIC STYLES */
    @media (max-width: 768px) {
      /* Prevent background scroll when modal is open */
      body.modal-open {
        overflow: hidden;
      }

      #memoryDetailModal {
        overflow: hidden;
      }

      #memoryDetailModal .modal-content {
        max-height: 100vh;
        max-width: 100%;
        border-radius: 0;
      }

      .detail-caption-container {
        -webkit-overflow-scrolling: touch;
      }

      /* ADD MEMORY BUTTON - Always visible */
      #addMemoryBtn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex !important;
        align-items: center;
        justify-content: center;
      }

      /* SURPRISE BUTTON - will be controlled by portrait/landscape media queries below */
      #surpriseBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 99;
      }

      /* MEDIA CONTAINER - show in portrait */
      .detail-media-container {
        width: 100%;
        max-height: 50vh;
        border-radius: 8px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      .detail-media-container img,
      .detail-media-container video {
        width: 100%;
        height: auto;
        max-height: 50vh;
        object-fit: contain;
        display: block !important;
        visibility: visible !important;
      }

      /* PORTRAIT ORIENTATION */
      @media (orientation: portrait) {
        #memoryDetailModal .modal-content {
          flex-direction: column;
          max-height: 100vh;
        }

        .detail-media-container {
          max-height: 50vh;
          width: 100%;
          display: flex;
          flex-shrink: 0;
        }

        .detail-media-container img,
        .detail-media-container video {
          width: 100%;
          height: auto;
          max-height: 50vh;
          object-fit: contain;
          display: block !important;
        }

        .detail-caption-container {
          max-width: 100%;
          flex: 1;
        }

        #memoryDetailModal .close-btn {
          top: 16px;
          right: 16px;
          z-index: 10002;
        }

        /* SURPRISE MODAL - portrait */
        #surprisePanel {
          width: 90vw;
          max-width: 400px;
          max-height: 85vh;
        }

        #surpriseMedia {
          max-height: 70vh;
          width: 100%;
        }

        #surpriseMedia img,
        #surpriseMedia video {
          max-height: 70vh;
          width: 100%;
        }
      }

      /* LANDSCAPE ORIENTATION */
      @media (orientation: landscape) {
        #memoryDetailModal .modal-content {
          flex-direction: row;
          max-height: 100vh;
        }

        .detail-media-container {
          max-height: 100vh;
          max-width: 70%;
          flex-shrink: 0;
        }

        .detail-media-container video {
          max-height: 100vh;
        }

        .detail-caption-container {
          max-width: 30%;
          flex: 1;
        }

        #memoryDetailModal .close-btn {
          top: 16px;
          right: 16px;
          z-index: 10002;
        }

        /* SURPRISE MODAL - landscape */
        #surprisePanel {
          width: 80vw;
          max-width: 600px;
          max-height: 90vh;
        }

        #surpriseMedia {
          max-height: 80vh;
          width: 100%;
        }

        #surpriseMedia img,
        #surpriseMedia video {
          max-height: 80vh;
          width: 100%;
        }
      }

      /* SURPRISE PANEL - mobile optimized */
      #surprisePanel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 85vw;
        max-width: 400px;
        z-index: 9998;
        background: rgba(0, 0, 0, 0.98);
        border-radius: 16px;
        padding: 16px;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        pointer-events: all;
      }

      #surprisePanel.visible {
        display: flex;
        pointer-events: all;
      }

      #surpriseMedia {
        width: 100%;
        max-height: 55vh;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      #surpriseMedia img,
      #surpriseMedia video {
        width: 100%;
        height: auto;
        max-height: 55vh;
        object-fit: contain;
        border-radius: 12px;
      }

      #surpriseClose {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 10000;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        border-radius: 50%;
        cursor: pointer;
        font-size: 24px;
      }
    }

    /* PORTRAIT MODE - phone sizes - HIDE SURPRISE */
    @media (max-width: 768px) and (orientation: portrait) {
      #surpriseBtn {
        display: none !important;
      }

      #surprisePanel {
        display: none !important;
      }

      #surprisePanel.visible {
        display: none !important;
      }
    }

    /* LANDSCAPE MODE - phone sizes - SHOW SURPRISE */
    @media (max-width: 768px) and (orientation: landscape) {
      #surpriseBtn {
        display: flex !important;
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 99;
        padding: 8px 12px;
        font-size: 12px;
      }

      #surprisePanel {
        width: 85vw;
        max-width: 550px;
        max-height: 85vh;
      }

      #surpriseMedia {
        max-height: 75vh;
      }
    }

    /* DESKTOP STYLES */
    @media (min-width: 769px) {
      #memoryDetailModal .modal-content {
        max-width: 600px;
        max-height: 80vh;
      }

      .detail-media-container {
        max-height: 50vh;
      }
    }

    .btn-action {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    body.soft .edit-btn {
      background: rgba(232, 160, 140, 0.3);
      color: #8b5040;
      border: 1px solid rgba(232, 160, 140, 0.5);
    }
    body.soft .edit-btn:hover {
      background: rgba(232, 160, 140, 0.5);
      transform: translateY(-2px);
    }

    body.soft .delete-btn {
      background: rgba(200, 80, 60, 0.2);
      color: #a04030;
      border: 1px solid rgba(200, 80, 60, 0.3);
    }
    body.soft .delete-btn:hover {
      background: rgba(200, 80, 60, 0.35);
      transform: translateY(-2px);
    }

    body.chaos .edit-btn {
      background: rgba(255, 110, 0, 0.2);
      color: #ff8844;
      border: 1px solid rgba(255, 110, 0, 0.4);
    }
    body.chaos .edit-btn:hover {
      background: rgba(255, 110, 0, 0.35);
      transform: translateY(-2px);
    }

    body.chaos .delete-btn {
      background: rgba(200, 80, 60, 0.2);
      color: #ff7744;
      border: 1px solid rgba(200, 80, 60, 0.3);
    }
    body.chaos .delete-btn:hover {
      background: rgba(200, 80, 60, 0.35);
      transform: translateY(-2px);
    }
    }
    body.chaos .delete-btn:hover {
      background: rgba(200, 80, 60, 0.35);
      transform: scale(1.1);
    }

    .memory-detail-content {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .detail-media-container {
      width: 100%;
      max-width: 600px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      margin-bottom: 32px;
      background: white;
    }

    .detail-media-container img,
    .detail-media-container video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 20px;
      animation: mediaFadeInUp 0.8s ease 0.2s forwards;
      opacity: 0;
    }

    .detail-caption-container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 0 20px;
    }

    .detail-caption {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      line-height: 1.6;
      opacity: 0;
      animation: captionFadeIn 1s ease 0.5s forwards;
      transition: color 0.8s ease;
    }

    body.soft .detail-caption { color: #5a3028; }
    body.chaos .detail-caption { color: #ffaa55; }

    @keyframes captionFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes mediaFadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal.active { display: flex; }

    .modal-content {
      position: relative;
      background: white;
      border-radius: 20px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      transition: background 0.8s ease;
    }
    body.soft .modal-content { background: rgba(255,252,250,0.97); }
    body.chaos .modal-content { background: rgba(20,8,0,0.97); }

    .modal-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 20px;
      transition: color 0.8s ease;
    }
    body.soft .modal-content h2 { color: #3d2520; }
    body.chaos .modal-content h2 { color: #fff3e0; }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.1);
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s ease;
    }
    .close-btn:hover { transform: scale(1.15); }

    #memoryFileInput,
    #memoryCaptionInput,
    #editCaptionInput {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    body.soft #memoryFileInput,
    body.soft #memoryCaptionInput,
    body.soft #editCaptionInput {
      background: rgba(232,160,140,0.08);
      color: #3d2520;
      border-color: rgba(232,160,140,0.2);
    }
    body.soft #memoryFileInput:focus,
    body.soft #memoryCaptionInput:focus,
    body.soft #editCaptionInput:focus {
      outline: none;
      background: rgba(232,160,140,0.15);
      border-color: rgba(232,160,140,0.4);
    }
    body.chaos #memoryFileInput,
    body.chaos #memoryCaptionInput,
    body.chaos #editCaptionInput {
      background: rgba(255,110,0,0.08);
      color: #fff3e0;
      border-color: rgba(255,110,0,0.2);
    }
    body.chaos #memoryFileInput:focus,
    body.chaos #memoryCaptionInput:focus,
    body.chaos #editCaptionInput:focus {
      outline: none;
      background: rgba(255,110,0,0.15);
      border-color: rgba(255,110,0,0.4);
    }

    #memoryCaptionInput,
    #editCaptionInput {
      resize: vertical;
      min-height: 80px;
      max-height: 200px;
    }

    .media-preview {
      width: 100%;
      max-height: 300px;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .media-preview img,
    .media-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-cancel,
    .btn-confirm,
    .btn-delete {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    body.soft .btn-cancel {
      background: rgba(232,160,140,0.1);
      color: #b07060;
      border: 1px solid rgba(232,160,140,0.2);
    }
    body.soft .btn-cancel:hover {
      background: rgba(232,160,140,0.2);
    }

    body.soft .btn-confirm {
      background: #e8a090;
      color: white;
    }
    body.soft .btn-confirm:hover {
      background: #d07060;
    }

    body.soft .btn-delete {
      background: rgba(200,80,60,0.15);
      color: #a04030;
      border: 1px solid rgba(200,80,60,0.2);
    }
    body.soft .btn-delete:hover {
      background: rgba(200,80,60,0.25);
    }

    body.chaos .btn-cancel {
      background: rgba(255,110,0,0.1);
      color: #cc7733;
      border: 1px solid rgba(255,110,0,0.2);
    }
    body.chaos .btn-cancel:hover {
      background: rgba(255,110,0,0.2);
    }

    body.chaos .btn-confirm {
      background: #ff7700;
      color: white;
    }
    body.chaos .btn-confirm:hover {
      background: #dd6600;
    }

    body.chaos .btn-delete {
      background: rgba(200,80,60,0.2);
      color: #ff9944;
      border: 1px solid rgba(200,80,60,0.25);
    }
    body.chaos .btn-delete:hover {
      background: rgba(200,80,60,0.3);
    }

    /* CARD */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      border-radius: 28px;
      padding: 36px 32px 32px;
      text-align: center;
      transition: all 0.9s ease;
    }
    body.soft .card {
      background: rgba(255,252,250,0.82);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(232,160,140,0.2);
      box-shadow: 0 32px 64px rgba(180,80,60,0.1), 0 8px 24px rgba(180,80,60,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    body.chaos .card {
      background: rgba(14,6,0,0.82);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,110,0,0.15);
      box-shadow: 0 32px 64px rgba(255,70,0,0.18), 0 8px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,140,40,0.08);
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.4s ease;
      margin-bottom: 24px;
    }
    body.soft .mode-toggle { background: rgba(232,160,140,0.15); color: #b06050; border: 1px solid rgba(232,160,140,0.3); }
    body.soft .mode-toggle:hover { background: rgba(232,160,140,0.28); transform: scale(1.03); }
    body.chaos .mode-toggle { background: rgba(255,110,0,0.12); color: #ff9944; border: 1px solid rgba(255,110,0,0.25); }
    body.chaos .mode-toggle:hover { background: rgba(255,110,0,0.22); transform: scale(1.03); }

    .greeting {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      line-height: 1.55;
      font-weight: 400;
      margin-bottom: 28px;
      min-height: 64px;
      transition: color 0.8s ease;
    }
    body.soft .greeting { color: #3d2520; }
    body.chaos .greeting { color: #fff3e0; }

    .divider {
      height: 1px;
      margin: 20px 0;
      transition: background 0.8s ease;
    }
    body.soft .divider { background: linear-gradient(to right, transparent, rgba(220,140,120,0.35), transparent); }
    body.chaos .divider { background: linear-gradient(to right, transparent, rgba(255,110,0,0.3), transparent); }

    .timer-ring-container {
      position: relative;
      width: 150px; height: 150px;
      margin: 0 auto 24px;
      display: none;
      animation: ringIn 0.5s ease both;
    }
    @keyframes ringIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .timer-ring-container.active { display: block; }
    svg.ring { transform: rotate(-90deg); }
    .ring-bg { stroke-width: 5; fill: none; }
    .ring-progress { stroke-width: 5; fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    body.soft .ring-bg { stroke: rgba(220,150,130,0.2); }
    body.soft .ring-progress { stroke: #e8a090; }
    body.chaos .ring-bg { stroke: rgba(255,110,0,0.15); }
    body.chaos .ring-progress { stroke: #ff7700; filter: drop-shadow(0 0 6px rgba(255,120,0,0.6)); }

    .timer-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -1px;
      transition: color 0.8s ease;
    }
    body.soft .timer-text { color: #d07060; }
    body.chaos .timer-text { color: #ff8833; }

    .buffer-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .buffer-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      margin-right: 4px;
      transition: color 0.8s ease;
    }
    body.soft .buffer-label { color: #b07060; }
    body.chaos .buffer-label { color: #cc7733; }

    .btn-buffer {
      padding: 6px 14px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    body.soft .btn-buffer { background: rgba(232,160,140,0.1); color: #b07060; border: 1px solid rgba(232,160,140,0.25); }
    body.soft .btn-buffer.active { background: #e8a090; color: white; border-color: #e8a090; }
    body.chaos .btn-buffer { background: rgba(255,110,0,0.08); color: #cc7733; border: 1px solid rgba(255,110,0,0.18); }
    body.chaos .btn-buffer.active { background: #ff7700; color: white; border-color: #ff7700; }

    .break-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .btn-break {
      flex: 1;
      padding: 15px 10px;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    body.soft .btn-break { background: rgba(232,160,140,0.15); color: #7a3a30; border: 1px solid rgba(232,160,140,0.3); }
    body.soft .btn-break:hover { background: #e8a090; color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(220,130,110,0.35); }
    body.chaos .btn-break { background: rgba(255,110,0,0.1); color: #ffaa55; border: 1px solid rgba(255,110,0,0.2); }
    body.chaos .btn-break:hover { background: #ff7700; color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,100,0,0.4); }

    .back-by {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-top: 10px;
      margin-bottom: 10px;
      min-height: 20px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.4s ease, transform 0.4s ease, color 0.8s ease;
    }
    .back-by.show { opacity: 1; transform: translateY(0); }
    body.soft .back-by { color: #b07060; }
    body.chaos .back-by { color: #ff9944; }

    .btn-end {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
    }
    body.soft .btn-end { background: transparent; color: #b07060; border: 1.5px solid rgba(220,150,130,0.3); }
    body.soft .btn-end:hover { background: rgba(220,150,130,0.08); border-color: rgba(220,150,130,0.5); }
    body.chaos .btn-end { background: transparent; color: #cc6622; border: 1.5px solid rgba(255,110,0,0.18); }
    body.chaos .btn-end:hover { background: rgba(255,110,0,0.08); border-color: rgba(255,110,0,0.35); }

    /* SHONY */
    #shony {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 64px; height: 64px;
      border-radius: 50%;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      cursor: pointer;
      z-index: 100;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: none;
      padding: 0;
    }
    #shony::-webkit-scrollbar { display: none; }
    #shony img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; }
    #shony:hover { transform: scale(1.1); }
    body.soft #shony { box-shadow: 0 4px 20px rgba(200,100,80,0.35); outline: 2px solid rgba(232,160,140,0.4); }
    body.chaos #shony { box-shadow: 0 4px 24px rgba(255,100,0,0.5), 0 0 0 1px rgba(255,110,0,0.2); }
    #shony.bounce { animation: shonyBounce 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
    @keyframes shonyBounce {
      0%   { transform: scale(1) rotate(0); }
      20%  { transform: scale(1.25) rotate(-14deg) translateY(-6px); }
      40%  { transform: scale(1.15) rotate(10deg) translateY(-10px); }
      60%  { transform: scale(1.1) rotate(-6deg) translateY(-4px); }
      80%  { transform: scale(1.05) rotate(3deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .memories-page #shony,
    .memories-page #surpriseBtn { display: none !important; }

    #shony-tip {
      position: fixed;
      bottom: 100px; right: 24px;
      max-width: 200px;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(8px) scale(0.96);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      z-index: 99;
      text-align: right;
    }
    #shony-tip.show { opacity: 1; transform: translateY(0) scale(1); }
    body.soft #shony-tip { background: rgba(255,252,250,0.97); backdrop-filter: blur(12px); color: #5a3028; border: 1px solid rgba(232,160,140,0.3); box-shadow: 0 8px 24px rgba(180,80,60,0.12); }
    body.chaos #shony-tip { background: rgba(20,8,0,0.97); backdrop-filter: blur(12px); color: #ffaa55; border: 1px solid rgba(255,110,0,0.25); box-shadow: 0 8px 24px rgba(255,80,0,0.2); }

    /* SURPRISE BUTTON */
    #surpriseBtn {
      position: fixed;
      bottom: 24px; right: 100px;
      width: auto;
      height: auto;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      padding: 12px 18px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      gap: 8px;
    }
    #surpriseBtn:hover { transform: scale(1.08); }
    body.soft #surpriseBtn {
      display: flex;
      background: rgba(255,240,235,0.92);
      box-shadow: 0 4px 20px rgba(200,100,80,0.3);
      outline: 2px solid rgba(232,160,140,0.4);
      color: #7a3a30;
    }
    body.chaos #surpriseBtn {
      display: flex;
      background: rgba(20,8,0,0.92);
      box-shadow: 0 4px 24px rgba(255,100,0,0.45), 0 0 0 1px rgba(255,110,0,0.2);
      color: #ffaa55;
    }

    /* SURPRISE PANEL — left in soft, right in chaos */
    #surprisePanel {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }
    #surprisePanel.visible {
      display: flex;
      pointer-events: all;
    }

    /* Soft: left side panel */
    body.soft #surprisePanel {
      left: 0;
      width: 42vw;
      max-width: 460px;
    }
    /* Chaos: right side panel */
    body.chaos #surprisePanel {
      right: 0;
      width: 45vw;
      max-width: 500px;
    }

    #surpriseMedia {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
      max-width: 82%;
      max-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #surpriseMedia img {
      width: 100%;
      max-height: 65vh;
      object-fit: cover;
      border-radius: 20px;
      display: block;
    }
    #surpriseMedia video {
      width: 100%;
      max-height: 65vh;
      border-radius: 20px;
      display: block;
      background: #000;
    }

    #surpriseClose {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }
    #surpriseClose:hover { transform: scale(1.15); }
    body.soft #surpriseClose { background: rgba(255,240,235,0.95); color: #7a3a30; box-shadow: 0 4px 12px rgba(180,80,60,0.2); }
    body.chaos #surpriseClose { background: rgba(20,8,0,0.95); color: #ffaa55; box-shadow: 0 4px 12px rgba(255,80,0,0.3); border: 1px solid rgba(255,110,0,0.25); }

    /* NOTIFICATION */
    #notif-wrap {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      pointer-events: none;
      width: 90%;
      max-width: 360px;
    }
    #notification {
      padding: 14px 22px;
      border-radius: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-style: italic;
      text-align: center;
      opacity: 0;
      transform: translateY(-10px) scale(0.97);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    #notification.show { opacity: 1; transform: translateY(0) scale(1); }
    #notification.soft { background: rgba(255,250,248,0.97); backdrop-filter: blur(16px); color: #5a3028; border: 1px solid rgba(232,160,140,0.35); box-shadow: 0 12px 40px rgba(180,80,60,0.15); }
    #notification.chaos { background: rgba(18,7,0,0.97); backdrop-filter: blur(16px); color: #ffaa55; border: 1px solid rgba(255,110,0,0.3); box-shadow: 0 12px 40px rgba(255,80,0,0.2); }

    /* MEMORIES NAV BUTTON */
    .memories-nav-btn {
      width: 100%;
      max-width: 400px;
      padding: 16px;
      border-radius: 20px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      transition: all 0.3s ease;
    }
    body.soft .memories-nav-btn {
      background: rgba(232,160,140,0.15);
      color: #7a3a30;
      border: 1.5px solid rgba(232,160,140,0.3);
    }
    body.soft .memories-nav-btn:hover {
      background: rgba(232,160,140,0.25);
      transform: scale(1.02);
    }
    body.chaos .memories-nav-btn {
      background: rgba(255,110,0,0.12);
      color: #ffaa55;
      border: 1.5px solid rgba(255,110,0,0.25);
    }
    body.chaos .memories-nav-btn:hover {
      background: rgba(255,110,0,0.22);
      transform: scale(1.02);
    }

    .heart-icon {
      font-size: 18px;
      animation: heartBeat 1.5s ease-in-out infinite;
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.3); }
      50% { transform: scale(1); }
    }

    /* ENTRANCE ANIMATION */
    .card > * { animation: fadeUp 0.55s ease both; }
    .card > *:nth-child(1) { animation-delay: 0.05s; }
    .card > *:nth-child(2) { animation-delay: 0.15s; }
    .card > *:nth-child(3) { animation-delay: 0.22s; }
    .card > *:nth-child(4) { animation-delay: 0.30s; }
    .card > *:nth-child(5) { animation-delay: 0.38s; }
    .card > *:nth-child(6) { animation-delay: 0.44s; }
    .card > *:nth-child(7) { animation-delay: 0.50s; }
    .card > *:nth-child(8) { animation-delay: 0.56s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .soft-photo, .soft-photo-tint,
      .chaos-photo, .chaos-photo-tint,
      .shony-label, #surprisePanel { display: none !important; }
      #surpriseBtn { display: none !important; }
    }

    /* ANNIVERSARY */
    .anniv-section {
      width: 100%;
      max-width: 400px;
      margin-top: 20px;
    }
    .anniv-card {
      border-radius: 28px;
      padding: 32px 32px 28px;
      text-align: center;
      transition: all 0.9s ease;
    }
    body.soft .anniv-card {
      background: rgba(255,252,250,0.82);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(232,160,140,0.2);
      box-shadow: 0 32px 64px rgba(180,80,60,0.1), 0 8px 24px rgba(180,80,60,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    body.chaos .anniv-card {
      background: rgba(14,6,0,0.82);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,110,0,0.15);
      box-shadow: 0 32px 64px rgba(255,70,0,0.18), 0 8px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,140,40,0.08);
    }
    .anniv-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      transition: color 0.8s ease;
    }
    body.soft .anniv-label { color: #c09080; }
    body.chaos .anniv-label { color: #cc7733; }
    .anniv-date {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 20px;
      transition: color 0.8s ease;
    }
    body.soft .anniv-date { color: #3d2520; }
    body.chaos .anniv-date { color: #fff3e0; }
    .anniv-divider {
      height: 1px;
      margin: 0 auto 20px;
      width: 60%;
      transition: background 0.8s ease;
    }
    body.soft .anniv-divider { background: linear-gradient(to right, transparent, rgba(220,140,120,0.35), transparent); }
    body.chaos .anniv-divider { background: linear-gradient(to right, transparent, rgba(255,110,0,0.3), transparent); }
    .anniv-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .anniv-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .anniv-number {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      transition: color 0.8s ease;
    }
    body.soft .anniv-number { color: #e8a090; }
    body.chaos .anniv-number { color: #ff8833; }
    .anniv-sublabel {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: color 0.8s ease;
    }
    body.soft .anniv-sublabel { color: #c09080; }
    body.chaos .anniv-sublabel { color: #cc7733; }
    .anniv-dot { font-size: 28px; padding-bottom: 20px; transition: color 0.8s ease; }
    body.soft .anniv-dot { color: rgba(220,140,120,0.35); }
    body.chaos .anniv-dot { color: rgba(255,110,0,0.25); }
    .anniv-footer {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-style: italic;
      transition: color 0.8s ease;
    }
    body.soft .anniv-footer { color: #c09080; }
    body.chaos .anniv-footer { color: #996633; }

    /* SPLASH SCREEN */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fdf0ec 0%, #fff5f2 100%);
      display: flex;

    // ══════════════════════════════════════
    function makeDeck(total) {
      const deck = { total, queue: [], used: [] };
      refillDeck(deck);
      return deck;
    }

    function refillDeck(deck) {
      const all = Array.from({ length: deck.total }, (_, i) => i + 1);
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      deck.queue = all;
      deck.used = [];
    }

    function nextFromDeck(deck) {
      if (deck.queue.length === 0) refillDeck(deck);
      const val = deck.queue.shift();
      deck.used.push(val);
      return val;
    }

      if (detailPage) detailPage.classList.remove('active');
      
      if (mode === 'soft') {
        modeIcon.textContent = '🌸';
        modeLabelT.textContent = 'Soft Mode';
        greetingEl.textContent = "Good morning ya helwaa. Here's a soft hug from me. 🤍";
      } else {
        modeIcon.textContent = '🔥';
        modeLabelT.textContent = 'Chaos Mode';
        greetingEl.textContent = "Ya5tn 3alehaaaa — time to own your day ya Monen. 🧡";
      }
    }

    toggleBtn.addEventListener('click', () => {
      const newMode = mode === 'soft' ? 'chaos' : 'soft';
      setMode(newMode);
      particleMode = newMode;
      if (newMode === 'soft') startSoftParticles();
      else startChaosParticles();
    });

    function showNotification(message) {
      notifEl.textContent = message;
      notifEl.className = mode;
      notifEl.classList.add('show');
      bounceShony();
      if (notifEl._t) clearTimeout(notifEl._t);
      notifEl._t = setTimeout(() => notifEl.classList.remove('show'), 5000);
    }

    function bounceShony() {
      shonyBtn.classList.remove('bounce');
      void shonyBtn.offsetWidth;
      shonyBtn.classList.add('bounce');
      setTimeout(() => shonyBtn.classList.remove('bounce'), 550);
    }

    shonyBtn.addEventListener('click', () => {
      const q = nextQuote();
      shonyTip.textContent = q;
      shonyTip.classList.add('show');
      bounceShony();
      clearTimeout(shonyTip._t);
      shonyTip._t = setTimeout(() => shonyTip.classList.remove('show'), 3800);
    });

    const audioStart = new Audio('audio/start.mp3');
    const audioEnd   = new Audio('audio/end.mp3');

    function playStart() { audioStart.currentTime = 0; audioStart.play().catch(() => {}); }
    function playEnd()   { audioEnd.currentTime = 0;   audioEnd.play().catch(() => {}); }

    function vibrate() {
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    function formatBackBy(date) {
      let h = date.getHours();
      const m = String(date.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `back by ${h}:${m} ${ampm}`;
    }

    function hideBackBy() {
      backByEl.classList.remove('show');
      backByEl.textContent = '';
    }

    function startBreak(minutes) {
      if (timer) clearInterval(timer);
      const actualMins = minutes - bufferMins;
      totalTime = actualMins * 60;
      timeRemaining = totalTime;
      const backByTime = new Date(Date.now() + actualMins * 60 * 1000);
      backByEl.textContent = formatBackBy(backByTime);
      backByEl.classList.add('show');
      ringCont.classList.add('active');
      updateRing();
      showNotification("ya5tn 🧡");
      playStart();
      timer = setInterval(() => {
        if (timeRemaining > 0) {
          timeRemaining--;
          updateRing();
        } else {
          clearInterval(timer);
          timer = null;
          ringCont.classList.remove('active');
          hideBackBy();
          showNotification("shantora ybntn 😤");
          playEnd();
          vibrate();
        }
      }, 1000);
    }

    function endBreak() {
      if (timer) clearInterval(timer);
      timer = null;
      timeRemaining = 0;
      ringCont.classList.remove('active');
      hideBackBy();
      showNotification("shantora ybntn 😤");
      playEnd();
      vibrate();
    }

    function updateRing() {
      const mins = Math.floor(timeRemaining / 60);
      const secs = timeRemaining % 60;
      timerText.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      const progress = totalTime > 0 ? timeRemaining / totalTime : 1;
      ringProg.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
    }

    document.getElementById('start15').addEventListener('click', () => startBreak(15));
    document.getElementById('start30').addEventListener('click', () => startBreak(30));
    document.getElementById('endBreak').addEventListener('click', endBreak);

    function updateAnniversary() {
      const start = new Date('2024-12-19');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const daysTogether = Math.floor((today - start) / (1000 * 60 * 60 * 24));
      let nextAnniv = new Date(today.getFullYear(), 11, 19);
      if (today >= nextAnniv) nextAnniv = new Date(today.getFullYear() + 1, 11, 19);
      const daysUntil = Math.floor((nextAnniv - today) / (1000 * 60 * 60 * 24));
      document.getElementById('daysTogether').textContent = daysTogether;
      document.getElementById('daysUntil').textContent = daysUntil;
      const footer = document.getElementById('anniversaryFooter');
      if (daysUntil === 0) footer.textContent = "happy anniversary ya Monen. 🤍";
      else if (daysUntil <= 7) footer.textContent = daysUntil + " days to go. don't forget. 🧡";
      else footer.textContent = "every day with you counts ya batota 🧡";
    }
    updateAnniversary();

    const surpriseBtn   = document.getElementById('surpriseBtn');
    const surprisePanel = document.getElementById('surprisePanel');
    const surpriseMedia = document.getElementById('surpriseMedia');
    const surpriseClose = document.getElementById('surpriseClose');

    let currentVideo = null;

    function closeSurprise() {
      surprisePanel.classList.remove('visible');
      if (currentVideo) {
        currentVideo.pause();
        currentVideo.src = '';
        currentVideo = null;
      }
      surpriseMedia.innerHTML = '';
    }

    function openSurprise() {
      closeSurprise();

      if (mode === 'soft') {
        const num = nextFromDeck(photoDeck);
        const img = document.createElement('img');
        img.src = `photos/us-${num}.jpg`;
        surpriseMedia.appendChild(img);
      } else {
        const num = nextFromDeck(videoDeck);
        const vid = document.createElement('video');
        vid.src = `videos/sealion-${num}.mp4`;
        vid.autoplay = true;
        vid.playsInline = true;
        vid.controls = false;
        vid.style.borderRadius = '20px';
        currentVideo = vid;

        vid.addEventListener('ended', () => {
          closeSurprise();
        });

        surpriseMedia.appendChild(vid);
        vid.play().catch(() => {});
      }

      surprisePanel.classList.add('visible');
    }

    surpriseBtn.addEventListener('click', () => {
      if (surprisePanel.classList.contains('visible')) {
        closeSurprise();
        setTimeout(openSurprise, 100);
      } else {
        openSurprise();
      }
    });

    surpriseClose.addEventListener('click', closeSurprise);

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleMode = null;
    let burstTimeout = null;
    let idleInterval = null;
    let animFrame = null;
    let isActive = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function createSoftParticle() {
      const types = ['petal', 'petal', 'petal', 'butterfly'];
      const type = types[Math.floor(Math.random() * types.length)];
      const colors = ['#f4a0a0','#f9c4b0','#f7d6d0','#eec4d4','#fff0f0','#f8b8c8'];
      return {
        type, x: Math.random() * canvas.width, y: -20,
        size: type === 'butterfly' ? (8 + Math.random() * 8) : (5 + Math.random() * 9),
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: 0.6 + Math.random() * 1.0, speedX: (Math.random() - 0.5) * 0.8,
        wobble: Math.random() * Math.PI * 2, wobbleSpeed: 0.015 + Math.random() * 0.02,
        wobbleAmp: 1.2 + Math.random() * 2, rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.04, alpha: 0, fadeIn: true,
        life: 0, maxLife: 280 + Math.random() * 180, wingPhase: Math.random() * Math.PI * 2,
      };
    }

    function drawPetal(p) {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.ellipse(0, 0, p.size * 0.5, p.size, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath(); ctx.ellipse(-p.size*0.12, -p.size*0.2, p.size*0.18, p.size*0.35, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function drawButterfly(p) {
      ctx.save(); ctx.translate(p.x, p.y); ctx.globalAlpha = p.alpha * 0.85;
      const flap = Math.sin(p.wingPhase) * 0.7; const s = p.size;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.ellipse(-s*0.5*Math.abs(Math.cos(p.wingPhase*0.5+0.3)), -s*0.3, s*0.7, s*0.45, -0.5+flap, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-s*0.4*Math.abs(Math.cos(p.wingPhase*0.5)), s*0.2, s*0.5, s*0.3, 0.4+flap, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*0.5*Math.abs(Math.cos(p.wingPhase*0.5+0.3)), -s*0.3, s*0.7, s*0.45, 0.5-flap, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*0.4*Math.abs(Math.cos(p.wingPhase*0.5)), s*0.2, s*0.5, s*0.3, -0.4-flap, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(120,60,80,0.6)';
      ctx.beginPath(); ctx.ellipse(0, 0, s*0.1, s*0.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function createEmber() {
      const colors = ['#ff6600','#ff9900','#ffcc00','#ff4400','#ffaa33'];
      return {
        type: 'ember', x: Math.random() * canvas.width, y: canvas.height + 10,
        size: 1.5 + Math.random() * 3, color: colors[Math.floor(Math.random() * colors.length)],
        speedY: -(2.5 + Math.random() * 4.0), speedX: (Math.random() - 0.5) * 1.2,
        wobble: Math.random() * Math.PI * 2, wobbleSpeed: 0.03 + Math.random() * 0.03,
        wobbleAmp: 1 + Math.random() * 2, alpha: 0, life: 0, maxLife: 60 + Math.random() * 40,
      };
    }

    function createFirework(x, y) {
      const count = 28 + Math.floor(Math.random() * 16);
      const hue = [22, 35, 45, 10][Math.floor(Math.random() * 4)];
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const speed = 2.5 + Math.random() * 3.5;
        particles.push({
          type: 'spark', x, y, size: 2 + Math.random() * 2.5,
          color: `hsl(${hue + Math.random()*20}, 100%, ${55 + Math.random()*20}%)`,
          speedX: Math.cos(angle) * speed, speedY: Math.sin(angle) * speed,
          alpha: 1, life: 0, maxLife: 55 + Math.random() * 40, gravity: 0.09,
        });
      }
    }

    function launchFirework() {
      createFirework(canvas.width * (0.2 + Math.random() * 0.6), canvas.height * (0.1 + Math.random() * 0.45));
    }

    function updateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.life++;
        if (p.type === 'petal' || p.type === 'butterfly') {
          p.wobble += p.wobbleSpeed; p.x += p.speedX + Math.sin(p.wobble) * p.wobbleAmp;
          p.y += p.speedY; p.rotation += p.rotSpeed;
          if (p.type === 'butterfly') p.wingPhase += 0.12;
          if (p.fadeIn && p.alpha < 0.85) p.alpha += 0.025; else p.fadeIn = false;
          if (p.life > p.maxLife * 0.75) p.alpha -= 0.018;
          if (p.alpha <= 0 || p.y > canvas.height + 30) { particles.splice(i, 1); continue; }
          p.type === 'butterfly' ? drawButterfly(p) : drawPetal(p);
        } else if (p.type === 'ember') {
          p.wobble += p.wobbleSpeed; p.x += p.speedX + Math.sin(p.wobble) * p.wobbleAmp;
          p.y += p.speedY; p.speedY *= 0.995;
          if (p.alpha < 0.9) p.alpha += 0.06;
          if (p.life > p.maxLife * 0.4) p.alpha -= 0.06;
          if (p.alpha <= 0 || p.y < -10) { particles.splice(i, 1); continue; }
          ctx.save();
          ctx.globalAlpha = p.alpha * 0.3; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        } else if (p.type === 'spark') {
          p.speedY += p.gravity; p.x += p.speedX; p.y += p.speedY; p.speedX *= 0.97;
          p.alpha = Math.max(0, 1 - p.life / p.maxLife);
          if (p.alpha <= 0) { particles.splice(i, 1); continue; }
          ctx.save(); ctx.globalAlpha = p.alpha;
          ctx.strokeStyle = p.color; ctx.lineWidth = p.size * 0.6;
          ctx.beginPath(); ctx.moveTo(p.x - p.speedX * 3, p.y - p.speedY * 3); ctx.lineTo(p.x, p.y); ctx.stroke();
          ctx.fillStyle = 'rgba(255,255,220,0.9)';
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.7, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
      }
      if (isActive) animFrame = requestAnimationFrame(updateParticles);
    }

    function stopParticles() {
      isActive = false;
      if (animFrame) cancelAnimationFrame(animFrame);
      if (burstTimeout) clearTimeout(burstTimeout);
      if (idleInterval) clearInterval(idleInterval);
      const fadeOut = setInterval(() => {
        particles.forEach(p => p.alpha -= 0.04);
        particles = particles.filter(p => p.alpha > 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (particles.length === 0) clearInterval(fadeOut);
      }, 30);
    }

    function startSoftParticles() {
      stopParticles();
      setTimeout(() => {
        isActive = true; particles = [];
        animFrame = requestAnimationFrame(updateParticles);
        let spawned = 0;
        const burst = setInterval(() => {
          if (spawned < 28) { particles.push(createSoftParticle()); spawned++; }
          else clearInterval(burst);
        }, 80);
        idleInterval = setInterval(() => {
          if (particleMode === 'soft' && particles.filter(p => p.type === 'petal' || p.type === 'butterfly').length < 12)
            particles.push(createSoftParticle());
        }, 1400);
      }, 200);
    }

    function startChaosParticles() {
      stopParticles();
      setTimeout(() => {
        isActive = true; particles = [];
        animFrame = requestAnimationFrame(updateParticles);
        launchFirework();
        setTimeout(launchFirework, 400);
        setTimeout(launchFirework, 800);
        let emberCount = 0;
        const emberBurst = setInterval(() => {
          particles.push(createEmber()); emberCount++;
          if (emberCount >= 20) clearInterval(emberBurst);
        }, 60);
        idleInterval = setInterval(() => {
          if (particleMode === 'chaos') launchFirework();
        }, 9000);
      }, 200);
    }

  </script>
</body>
